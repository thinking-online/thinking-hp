<body>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Voices.jsx?v=20260513-grad-interview"></script>
  <script type="text/babel" src="components/Founder.jsx?v=20260513-bio"></script>
  <script type="text/babel" src="components/FlowAndCTA.jsx?v=20260513-bio"></script>
  <script type="text/babel" src="components/SiteFooter.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#c8a868"
    }/*EDITMODE-END*/;

    // accent presets
    const ACCENTS = {
      "Gold (default)": "#c8a868",
      "Champagne": "#d9bf85",
      "Bronze": "#b08d52",
      "Crimson": "#c97a6a",
      "Sage": "#9bb091",
      "Slate Blue": "#8ea5b8",
    };

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Apply accent globally
      React.useEffect(() => {
        const root = document.documentElement;
        const accent = tweaks.accent || "#c8a868";
        // derive bright/deep with simple math
        const bright = lighten(accent, 0.12);
        const deep = darken(accent, 0.18);
        root.style.setProperty("--accent", accent);
        root.style.setProperty("--accent-bright", bright);
        root.style.setProperty("--accent-deep", deep);
        root.style.setProperty("--gold", accent);
        root.style.setProperty("--gold-bright", bright);
        root.style.setProperty("--gold-deep", deep);
      }, [tweaks.accent]);

      // Reveal-on-scroll
      React.useEffect(() => {
        const els = document.querySelectorAll(".reveal");
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add("in");
                io.unobserve(e.target);
              }
            });
          },
          { threshold: 0.12 }
        );
        els.forEach((el) => io.observe(el));
        return () => io.disconnect();
      }, []);

      return (
        <>
          <Intro />
          <Hero />
          <WhyFaculty />
          <Faculties />
          <Method />
          <Voices />
          <Founder />
          <FlowAndCTA />
          <SiteFooter />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Accent Color">
              <TweakColor
                label="Accent"
                value={tweaks.accent}
                onChange={(v) => setTweak("accent", v)}
              />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginTop: 10 }}>
                {Object.entries(ACCENTS).map(([name, hex]) => (
                  <button
                    key={name}
                    onClick={() => setTweak("accent", hex)}
                    style={{
                      padding: "10px 6px",
                      border: tweaks.accent === hex ? `1px solid ${hex}` : "1px solid #2a2620",
                      background: "#15120e",
                      color: "#e8dcc0",
                      fontSize: 11,
                      fontFamily: "system-ui, sans-serif",
                      cursor: "pointer",
                      display: "flex",
                      flexDirection: "column",
                      gap: 6,
                      alignItems: "center",
                    }}
                  >
                    <span style={{
                      display: "block", width: "100%", height: 18, background: hex,
                    }} />
                    <span>{name}</span>
                  </button>
                ))}
              </div>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    // simple hex lighten/darken
    function lighten(hex, amt) { return mix(hex, "#ffffff", amt); }
    function darken(hex, amt) { return mix(hex, "#000000", amt); }
    function mix(a, b, t) {
      const ca = parse(a), cb = parse(b);
      const r = Math.round(ca[0] + (cb[0] - ca[0]) * t);
      const g = Math.round(ca[1] + (cb[1] - ca[1]) * t);
      const bl = Math.round(ca[2] + (cb[2] - ca[2]) * t);
      return `#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${bl.toString(16).padStart(2,"0")}`;
    }
    function parse(hex) {
      const h = hex.replace("#", "");
      return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
