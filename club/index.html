<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#172642">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>家勉部 部室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div id="screen-loading" class="state">
  <div class="state-inner">
    <img class="state-mascot" src="assets/mascot.png" alt="" width="120" height="120">
    <div class="spinner" aria-hidden="true"></div>
    <div class="crest">IEBENBU</div>
    <h1>部室を開いています…</h1>
  </div>
</div>

<div id="screen-gate" class="state" style="display:none">
  <div class="state-inner">
    <img class="state-mascot" src="assets/mascot.png" alt="" width="120" height="120">
    <div class="crest">IEBENBU</div>
    <h1 id="gate-title">このページは家勉部員専用です</h1>
    <p id="gate-text"></p>
    <div id="gate-idwrap" style="display:none">
      <div class="idbox" id="gate-id"></div>
      <button class="copybtn" id="gate-copy" type="button">IDをコピーする</button>
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <header class="hero">
    <div class="hero-top">
      <div class="brandline">
        <div class="brand">
          <img class="brand-logo" src="assets/logo-iebenbu.png" alt="家勉部" width="44" height="44">
        </div>
        <div class="status-pill" id="h-status"></div>
      </div>
    </div>
    <div class="hero-body">
      <div class="hero-copy">
        <div class="hello" id="h-name"></div>
        <div class="weekstat">
          <div class="big num" id="h-week">0</div>
          <div class="unit">今週の勉強時間</div>
        </div>
        <div class="weekstat-label">一緒だから、続けられる。</div>
      </div>
      <div class="hero-visual">
        <img src="assets/hero-study.png" alt="" width="130" height="130" loading="eager">
      </div>
    </div>
  </header>

  <main class="wrap">

    <section class="card">
      <div class="card-head">
        <h2>自習室</h2>
      </div>
      <div class="card-visual card-visual--wide">
        <img src="assets/study-room.png" alt="" loading="lazy">
      </div>
      <div class="card-body">
        <a class="roombtn disabled" id="room-btn" href="#" target="_blank" rel="noopener">自習室に入室する</a>
        <div class="hours-note" id="room-hours"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>今日の勉強時間を記録</h2>
      </div>
      <div class="card-visual card-visual--tall">
        <img src="assets/study-log.png" alt="" loading="lazy">
      </div>
      <div class="card-body">
        <div class="today-line">今日の記録: <b id="log-today">0分</b>（再送信すると上書きされます）</div>
        <div class="chips" id="chips"></div>
        <div class="custom-row">
          <select id="sel-h" aria-label="時間"></select><span>時間</span>
          <select id="sel-m" aria-label="分"></select><span>分</span>
        </div>
        <button class="recordbtn" id="log-btn" type="button">この時間で記録する</button>
        <div class="record-done" id="log-done">
          <img src="assets/achievement.png" alt="" width="64" height="64" class="record-done-img">
          記録しました。積み上げ更新。
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>今週の小テスト範囲</h2>
      </div>
      <div class="card-visual card-visual--square">
        <img src="assets/weekly-quiz.png" alt="" loading="lazy">
      </div>
      <div class="card-body card-body--tight">
        <div class="range-list" id="weekly-list"><div class="skeleton">読み込み中…</div></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>勉強時間ランキング（今週）</h2>
      </div>
      <div class="card-visual card-visual--wide">
        <img src="assets/ranking.png" alt="" loading="lazy">
      </div>
      <div class="card-body card-body--tight">
        <div id="time-ranking"><div class="skeleton">読み込み中…</div></div>
        <div class="myrank" id="time-myrank" style="display:none"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>小テストランキング</h2>
      </div>
      <div class="card-body">
        <div class="period" id="test-period"></div>
        <div class="tabs" id="test-tabs"></div>
        <div id="test-panel"><div class="skeleton">読み込み中…</div></div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>会員限定コンテンツ</h2>
      </div>
      <div class="card-visual card-visual--tall">
        <img src="assets/member-content.png" alt="" loading="lazy">
      </div>
      <div class="card-body card-body--tight">
        <div id="contents-list"><div class="skeleton">読み込み中…</div></div>
      </div>
    </section>

    <footer>THINKING — IEBENBU</footer>
  </main>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzRtEbxXA7ijb-grWU1x7FwLjomnXFYvkRQ8XQIvYhANcxR2824NneO0U5_PMchichKJQ/exec';
const LIFF_ID = '2010378695-4j2cx38C';

let idToken = '';
let selMinutes = 0;

const $ = (id) => document.getElementById(id);

function fmtMin(min){
  min = Number(min) || 0;
  const h = Math.floor(min / 60), m = min % 60;
  if (h === 0) return m + '分';
  if (m === 0) return h + '時間';
  return h + '時間' + m + '分';
}

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function api(action){
  const res = await fetch(API_URL + '?action=' + action + '&token=' + encodeURIComponent(idToken));
  return res.json();
}

function showGate(me){
  $('screen-loading').style.display = 'none';
  $('screen-gate').style.display = 'flex';
  const reason = me && me.reason ? me.reason : '';
  if (reason === 'not_member'){
    $('gate-title').textContent = 'このページは家勉部員専用です';
    $('gate-text').textContent = '入部手続き中の人は、下のIDをコピーして公式LINEのトークに送ってください。登録が完了するとこのページが開けるようになります。';
    const decoded = liff.getDecodedIDToken();
    const sub = decoded && decoded.sub ? decoded.sub : '取得できませんでした';
    $('gate-id').textContent = sub;
    $('gate-idwrap').style.display = 'block';
    $('gate-copy').onclick = () => {
      navigator.clipboard.writeText(sub).then(() => toast('コピーしました'));
    };
  } else if (reason === '休会'){
    $('gate-title').textContent = 'ただいま休会中です';
    $('gate-text').textContent = '復帰の際は公式LINEからご連絡ください。部室はいつでも待っています。';
  } else if (reason === '退会'){
    $('gate-title').textContent = '部員登録が見つかりません';
    $('gate-text').textContent = '再入部を希望する場合は、公式LINEからご連絡ください。';
  } else {
    $('gate-title').textContent = '読み込みに失敗しました';
    $('gate-text').textContent = '電波の良い場所でページを開き直してみてください。直らない場合は公式LINEへ。';
  }
}

/* ---------- ヘッダー ---------- */
function renderHeader(me){
  $('h-name').textContent = me.member.display_name + ' さん';
  $('h-status').textContent = '部員ステータス: ' + me.member.member_status;
  $('h-week').textContent = fmtMin(me.week_minutes);
  $('log-today').textContent = fmtMin(me.today_minutes);
  presetSelectors(me.today_minutes);
}

/* ---------- 記録UI ---------- */
const CHIP_DEFS = [30, 60, 90, 120, 180, 240, 300, 360];

function buildChips(){
  const box = $('chips');
  CHIP_DEFS.forEach(min => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.type = 'button';
    b.textContent = fmtMin(min);
    b.onclick = () => { setMinutes(min); };
    b.dataset.min = min;
    box.appendChild(b);
  });
  const selH = $('sel-h'), selM = $('sel-m');
  for (let h = 0; h <= 16; h++){
    const o = document.createElement('option');
    o.value = h * 60; o.textContent = h;
    selH.appendChild(o);
  }
  [0,10,20,30,40,50].forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = ('0' + m).slice(-2);
    selM.appendChild(o);
  });
  selH.onchange = selM.onchange = () => {
    selMinutes = Number(selH.value) + Number(selM.value);
    syncChips();
  };
}

function setMinutes(min){
  selMinutes = min;
  $('sel-h').value = Math.floor(min / 60) * 60;
  $('sel-m').value = min % 60;
  syncChips();
}

function presetSelectors(todayMin){
  if (todayMin > 0) setMinutes(roundToSelectable(todayMin));
  else setMinutes(60);
}

function roundToSelectable(min){
  const h = Math.floor(min / 60) * 60;
  const m = Math.round((min % 60) / 10) * 10;
  return Math.min(h + (m >= 60 ? 50 : m), 16 * 60);
}

function syncChips(){
  document.querySelectorAll('.chip').forEach(c => {
    c.classList.toggle('on', Number(c.dataset.min) === selMinutes);
  });
}

async function submitLog(){
  if (selMinutes < 1){ toast('時間を選んでください'); return; }
  const btn = $('log-btn');
  btn.disabled = true; btn.textContent = '記録中…';
  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'log_study', token: idToken, minutes: selMinutes })
    });
    const data = await res.json();
    if (data.status === 'ok'){
      $('log-today').textContent = fmtMin(data.today_minutes);
      $('h-week').textContent = fmtMin(data.week_minutes);
      $('log-done').style.display = 'block';
      toast('今日の記録: ' + fmtMin(data.today_minutes));
      loadTimeRanking();
    } else {
      toast('記録に失敗しました。もう一度どうぞ');
    }
  }catch(e){
    toast('通信エラー。電波を確認してください');
  }
  btn.disabled = false; btn.textContent = 'この時間で記録する';
}

/* ---------- 週間情報 ---------- */
async function loadWeekly(){
  try{
    const data = await api('weekly');
    if (data.status !== 'ok') return;
    if (data.room_url){
      const b = $('room-btn');
      b.href = data.room_url;
      b.classList.remove('disabled');
    }
    if (data.hours) $('room-hours').textContent = '開放時間: ' + data.hours;
    const list = $('weekly-list');
    list.innerHTML = '';
    if (!data.items || data.items.length === 0){
      list.innerHTML = '<div class="empty-note">今週の範囲は準備中です。配信をお待ちください。</div>';
      return;
    }
    data.items.forEach(it => {
      const row = document.createElement('div');
      row.className = 'range-item';
      row.innerHTML = '<div class="range-subject"></div><div><div class="range-text"></div><div class="range-note"></div></div>';
      row.querySelector('.range-subject').textContent = it.subject;
      row.querySelector('.range-text').textContent = it.range;
      const note = row.querySelector('.range-note');
      if (it.note) note.textContent = it.note; else note.remove();
      list.appendChild(row);
    });
  }catch(e){
    $('weekly-list').innerHTML = '<div class="empty-note">読み込みに失敗しました</div>';
  }
}

/* ---------- 勉強時間ランキング ---------- */
function rankRow(rank, name, val, isMe){
  const row = document.createElement('div');
  row.className = 'rk-row' + (isMe ? ' me' : '');
  const rk = document.createElement('div');
  rk.className = 'rk-rank num' + (rank <= 3 ? ' r' + rank : '');
  rk.textContent = rank;
  const nm = document.createElement('div');
  nm.className = 'rk-name';
  nm.textContent = name + (isMe ? '（あなた）' : '');
  const vl = document.createElement('div');
  vl.className = 'rk-val num';
  vl.textContent = val;
  row.appendChild(rk); row.appendChild(nm); row.appendChild(vl);
  return row;
}

async function loadTimeRanking(){
  try{
    const data = await api('ranking');
    if (data.status !== 'ok') return;
    const box = $('time-ranking');
    box.innerHTML = '';
    if (!data.ranking || data.ranking.length === 0){
      box.innerHTML = '<div class="empty-note">今週はまだ記録がありません。一番乗りのチャンス。</div>';
      $('time-myrank').style.display = 'none';
      return;
    }
    data.ranking.forEach(r => {
      box.appendChild(rankRow(r.rank, r.name, fmtMin(r.minutes), r.is_me));
    });
    const my = $('time-myrank');
    if (data.my_rank){
      my.innerHTML = 'あなたは現在 <b>' + data.my_rank + '位</b>｜今週 ' + fmtMin(data.my_minutes);
      my.style.display = 'block';
    } else {
      my.innerHTML = '今日の記録を送ると、ランキングに参加できます';
      my.style.display = 'block';
    }
  }catch(e){
    $('time-ranking').innerHTML = '<div class="empty-note">読み込みに失敗しました</div>';
  }
}

/* ---------- 小テストランキング ---------- */
let testData = null;

async function loadTestRanking(){
  try{
    const data = await api('test_ranking');
    if (data.status !== 'ok'){
      $('test-panel').innerHTML = '<div class="empty-note">ランキングは準備中です</div>';
      return;
    }
    testData = data;
    const tabs = $('test-tabs');
    tabs.innerHTML = '';
    data.subjects.forEach((s, i) => {
      const b = document.createElement('button');
      b.className = 'tab' + (i === 0 ? ' on' : '');
      b.type = 'button';
      b.textContent = s.subject;
      b.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
        b.classList.add('on');
        renderTestPanel(i);
      };
      tabs.appendChild(b);
    });
    renderTestPanel(0);
  }catch(e){
    $('test-panel').innerHTML = '<div class="empty-note">読み込みに失敗しました</div>';
  }
}

function renderTestPanel(i){
  const panel = $('test-panel');
  panel.innerHTML = '';
  const s = testData.subjects[i];
  if (!s || s.entries.length === 0){
    panel.innerHTML = '<div class="empty-note">今週のデータはまだありません</div>';
    return;
  }
  s.entries.slice(0, 7).forEach(e => {
    panel.appendChild(rankRow(e.rank, e.name, e.rate + '%', e.is_me));
  });
}

/* ---------- コンテンツ ---------- */
async function loadContents(){
  try{
    const data = await api('contents');
    const box = $('contents-list');
    box.innerHTML = '';
    if (data.status !== 'ok' || !data.items || data.items.length === 0){
      box.innerHTML = '<div class="lock-note">コンテンツはこれから増えていきます。お楽しみに。</div>';
      return;
    }
    data.items.forEach(it => {
      const a = document.createElement('a');
      a.className = 'content-item';
      a.href = it.url; a.target = '_blank'; a.rel = 'noopener';
      const cat = document.createElement('span');
      cat.className = 'content-cat';
      cat.textContent = it.category || '教材';
      const title = document.createElement('span');
      title.className = 'content-title';
      title.textContent = it.title;
      const arrow = document.createElement('span');
      arrow.className = 'content-arrow';
      arrow.textContent = '→';
      a.appendChild(cat); a.appendChild(title); a.appendChild(arrow);
      box.appendChild(a);
    });
  }catch(e){
    $('contents-list').innerHTML = '<div class="lock-note">読み込みに失敗しました</div>';
  }
}

/* ---------- 起動 ---------- */
async function main(){
  buildChips();
  $('log-btn').onclick = submitLog;
  try{
    await liff.init({ liffId: LIFF_ID });
  }catch(e){
    showGate(null);
    return;
  }
  if (!liff.isLoggedIn()){
    liff.login();
    return;
  }
  idToken = liff.getIDToken();
  let me;
  try{
    me = await api('me');
  }catch(e){
    showGate(null);
    return;
  }
  if (!me || me.status !== 'ok'){
    showGate(me);
    return;
  }
  renderHeader(me);
  $('screen-loading').style.display = 'none';
  $('app').style.display = 'block';
  loadWeekly();
  loadTimeRanking();
  loadTestRanking();
  loadContents();
}

main();
</script>
</body>
</html>
