<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2e2a5e">
<title>逆転設計室｜学部別合格設計塾 THINKING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --purple-deep:#2e2a5e;--purple-mid:#6b63b5;--purple-light:#9b94d4;--purple-pale:#eceaf7;
    --lavender-bg:#f0f0f8;--accent-warm:#d4a84b;--accent-glow:#f5e6c8;
    --navy:var(--purple-deep);--navy2:#353164;--gold:var(--purple-mid);--gold-bg:var(--purple-pale);
    --verm:#5a4a9e;--ink:#2a2848;--muted:#6a6689;--line:#dad6ec;--bg:var(--lavender-bg);--card:#fff;--radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans JP",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6;}
  .wrap{max-width:480px;margin:0 auto;padding:0 16px 72px;}
  header.page-hero{background:var(--bg);position:relative;overflow:hidden;}
  .hero-cover{width:100%;max-width:480px;margin:0 auto;line-height:0;background:var(--lavender-bg);position:relative;}
  .hero-cover-img{width:100%;height:auto;display:block;}
  .hero-cover-kick{position:absolute;top:0;left:0;right:0;z-index:1;padding:calc(14px + env(safe-area-inset-top)) 16px 0;font-size:11px;letter-spacing:.16em;color:var(--purple-deep);font-weight:500;text-align:center;line-height:1.6;text-shadow:0 1px 8px rgba(240,240,248,.9);}
  .hero-panel{max-width:480px;margin:-28px auto 0;padding:18px 16px 20px;background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;box-shadow:0 -8px 32px -8px rgba(46,42,94,.14);position:relative;z-index:2;}
  .brandrow{display:flex;align-items:center;gap:9px;}
  .crown{width:22px;height:22px;color:var(--purple-mid);flex:none;}
  .brandname{font-family:"Noto Serif JP",serif;font-weight:700;font-size:22px;color:var(--purple-deep);}
  .hero-tagline{margin-top:6px;font-size:13px;color:var(--purple-mid);letter-spacing:.06em;}
  section{margin-top:20px;}
  .card{background:var(--card);border:0.5px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:0 4px 20px -8px rgba(46,42,94,.08);}
  .pack-promo{border:1.5px solid var(--purple-mid);}
  .kicker{font-size:11px;letter-spacing:.1em;color:var(--purple-mid);font-weight:700;}
  .h{font-size:17px;font-weight:700;color:var(--purple-deep);margin:0;}
  .muted{color:var(--muted);}
  .serif-title{font-family:"Noto Serif JP",serif;font-size:20px;font-weight:700;color:var(--purple-deep);margin:3px 0 12px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--purple-deep);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;text-decoration:none;}
  .btn:active{transform:scale(.985);}
  .btn.gold{background:var(--purple-mid);}
  .btn.ghost{background:#fff;color:var(--purple-deep);border:1px solid var(--line);}
  .btn.sm{padding:8px 15px;font-size:13px;border-radius:9px;}
  input,select{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  input:focus,select:focus{outline:2px solid var(--purple-mid);outline-offset:1px;}
  .count{font-size:40px;font-weight:700;color:var(--purple-mid);font-family:"Noto Serif JP",serif;line-height:1;}
  .ticket{border:1.5px solid var(--purple-mid);}
  .perk{background:var(--gold-bg);border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:10px;border:0.5px solid var(--line);}
  .perk .crown{color:var(--purple-mid);width:20px;height:20px;}
  .perktext{font-size:12.5px;color:#4a4578;line-height:1.5;}
  .packimg{width:100%;aspect-ratio:16/9;border-radius:10px;object-fit:cover;display:block;margin-bottom:12px;border:0.5px solid var(--line);}
  .placeholder{background:var(--purple-pale);display:flex;align-items:center;justify-content:center;text-align:center;padding:10px;}
  .swipe{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x proximity;}
  .swcard{scroll-snap-align:start;flex:0 0 auto;width:124px;background:var(--bg);border:0.5px solid var(--line);border-radius:12px;padding:13px;display:flex;flex-direction:column;gap:7px;cursor:pointer;text-align:left;font-family:inherit;}
  .swcard:active{transform:scale(.98);}
  .swcard.locked{opacity:.9;cursor:default;}
  .swkind{font-size:10px;letter-spacing:.08em;color:var(--purple-mid);font-weight:700;}
  .freechip{font-size:10px;background:#fff;color:var(--purple-mid);border:1px solid var(--purple-mid);padding:1px 7px;border-radius:6px;align-self:flex-start;font-weight:700;}
  .swtitle{font-size:13px;font-weight:500;color:var(--ink);line-height:1.35;min-height:2.6em;}
  .swtitle.muted{font-weight:400;color:var(--muted);}
  .swopen{font-size:11px;color:var(--purple-deep);}
  .swlocked{font-size:11px;color:var(--muted);}
  .swipehint{font-size:11px;color:var(--muted);margin-top:7px;}
  .catrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--line);}
  .catrow:last-child{border-bottom:none;}
  .catname{font-size:14px;color:var(--ink);}
  .catmeta{font-size:12px;color:var(--muted);margin-top:1px;}
  .samplelink{color:var(--purple-mid);font-weight:500;text-decoration:none;cursor:pointer;}
  .reqhead{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .center{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:0 16px;}
  .app-hidden{opacity:0;visibility:hidden;}
  .app-reveal{animation:app-reveal .55s cubic-bezier(.22,.61,.36,1) forwards;}
  @keyframes app-reveal{from{opacity:0;transform:scale(.96) translateY(10px);}to{opacity:1;transform:none;}}
  .splash{position:fixed;inset:0;z-index:100;background:#eceaf4;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
  .splash-sheet-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:480px;padding:calc(14px + env(safe-area-inset-top)) 18px 10px;transition:opacity .4s ease,transform .5s ease;}
  .exam-sheet{position:relative;width:100%;background:#fffef8;border:1px solid #d4d0e8;border-radius:4px;padding:18px 16px 20px;box-shadow:0 14px 48px -14px rgba(46,42,94,.16);overflow:hidden;}
  .exam-sheet::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 27px,#edeaf6 27px,#edeaf6 28px),repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(107,99,181,.04) 27px,rgba(107,99,181,.04) 28px);opacity:.7;pointer-events:none;}
  .exam-brand{position:absolute;top:10px;right:12px;font-size:8px;letter-spacing:.28em;color:var(--purple-mid);font-weight:600;opacity:.75;}
  .exam-head{position:relative;display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--purple-deep);padding-bottom:8px;margin-bottom:10px;padding-right:48px;}
  .exam-head-title{margin:0;font-family:"Noto Serif JP",serif;font-size:15px;font-weight:700;color:var(--purple-deep);letter-spacing:.08em;}
  .exam-head-sub{margin:0;font-size:10px;color:var(--purple-mid);letter-spacing:.1em;font-weight:500;}
  .exam-colhead{position:relative;display:grid;grid-template-columns:4.2em 1fr 3.4em 2em;gap:4px;font-size:9px;color:var(--muted);letter-spacing:.08em;padding-bottom:6px;border-bottom:1px solid #e8e2d6;}
  .exam-row{position:relative;display:grid;grid-template-columns:4.2em 1fr 3.4em 2em;gap:4px;align-items:center;padding:10px 0;border-bottom:1px dashed #ebe6dc;opacity:.35;transition:opacity .35s ease;}
  .exam-row.live{opacity:1;}
  .exam-subj{font-size:11.5px;font-weight:600;color:var(--ink);line-height:1.35;}
  .exam-bar{height:5px;background:#edeaf4;border-radius:999px;overflow:hidden;}
  .exam-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--purple-light),var(--purple-mid));border-radius:999px;transition:width .45s cubic-bezier(.22,.61,.36,1);}
  .exam-row.checked .exam-bar-fill{width:var(--fill,80%);}
  .exam-score{font-size:11px;font-weight:700;color:var(--purple-deep);text-align:right;}
  .exam-mark{text-align:center;min-height:22px;line-height:1;}
  .exam-row.checked .exam-mark::after{content:'○';color:#d63c31;font-size:17px;font-weight:700;animation:mark-pop .32s cubic-bezier(.22,.61,.36,1);}
  .exam-total{position:relative;display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;padding-top:10px;border-top:2px solid var(--purple-deep);}
  .exam-total-label{font-size:11px;font-weight:700;color:var(--purple-deep);letter-spacing:.06em;line-height:1.4;}
  .exam-total-val{font-family:"Noto Serif JP",serif;font-size:26px;font-weight:700;color:var(--purple-deep);opacity:0;transform:translateY(6px);transition:opacity .4s ease,transform .4s ease;}
  .exam-total-val.show{opacity:1;transform:none;}
  .exam-total-val small{font-size:11px;font-weight:500;color:var(--muted);margin-left:2px;}
  .pass-stamp{position:absolute;right:5%;bottom:12%;z-index:6;border:3px double #c0392b;color:#c0392b;font-family:"Noto Serif JP",serif;text-align:center;padding:8px 14px 10px;border-radius:5px;opacity:0;transform:scale(2.4) rotate(-8deg);pointer-events:none;background:rgba(255,254,248,.82);line-height:1.2;}
  .stamp-main{display:block;font-size:20px;font-weight:700;letter-spacing:.2em;}
  .stamp-sub{display:block;margin-top:3px;font-size:10px;font-weight:700;letter-spacing:.24em;opacity:.88;}
  .pass-stamp.show{animation:stamp-slam .5s cubic-bezier(.22,.61,.36,1) forwards;}
  .red-pen{position:absolute;z-index:7;width:30px;height:30px;opacity:0;pointer-events:none;transition:left .32s cubic-bezier(.22,.61,.36,1),top .32s cubic-bezier(.22,.61,.36,1),opacity .2s ease,transform .2s ease;filter:drop-shadow(1px 3px 3px rgba(0,0,0,.2));}
  .red-pen.active{opacity:1;}
  .red-pen.tap{transform:scale(.88) rotate(-6deg);}
  .splash-hud{position:relative;z-index:10;width:100%;max-width:480px;text-align:center;padding:4px 28px calc(22px + env(safe-area-inset-bottom));transition:opacity .35s ease,transform .45s cubic-bezier(.22,.61,.36,1);}
  .splash-label{margin:0 0 4px;font-size:12px;letter-spacing:.22em;color:var(--purple-mid);font-weight:500;}
  .splash-pct{margin:0;font-family:"Noto Serif JP",serif;font-size:56px;font-weight:700;color:var(--purple-deep);line-height:1;letter-spacing:-.02em;min-width:2.4em;}
  .splash-track{width:min(240px,74vw);height:5px;margin:14px auto 0;background:#e4e1f2;border-radius:999px;overflow:hidden;}
  .splash-fill{height:100%;width:0;background:linear-gradient(90deg,var(--purple-light),var(--purple-deep));border-radius:999px;transition:width .1s linear;}
  .splash-glow{position:absolute;inset:0;z-index:3;opacity:0;background:radial-gradient(circle at 50% 40%,rgba(107,99,181,.22) 0%,rgba(107,99,181,0) 58%);pointer-events:none;}
  .splash.boom .splash-glow{opacity:1;animation:splash-glow-pulse .55s ease-out;}
  .splash.boom .exam-sheet{animation:sheet-slam .48s cubic-bezier(.22,.61,.36,1);}
  .splash-door{position:absolute;top:0;bottom:0;width:51%;z-index:8;opacity:0;background:linear-gradient(165deg,#353164 0%,var(--purple-deep) 42%,#181632 100%);transition:opacity .15s ease,transform .78s cubic-bezier(.7,.02,.18,1);box-shadow:inset 0 0 80px rgba(0,0,0,.3);pointer-events:none;}
  .splash-door-left{left:0;border-right:1px solid rgba(255,255,255,.07);}
  .splash-door-right{right:0;border-left:1px solid rgba(255,255,255,.07);}
  .splash.boom .splash-door{opacity:1;}
  .splash.boom .splash-hud{animation:splash-shake .42s cubic-bezier(.22,.61,.36,1);}
  .splash.boom .splash-pct{animation:splash-boom .42s cubic-bezier(.22,.61,.36,1);}
  .splash.boom::after{content:'';position:absolute;inset:0;z-index:9;background:radial-gradient(circle at 50% 42%,rgba(255,255,255,.9) 0%,rgba(240,240,248,0) 62%);animation:splash-flash .48s ease-out;pointer-events:none;}
  .splash.open .splash-door-left{transform:translateX(-102%);}
  .splash.open .splash-door-right{transform:translateX(102%);}
  .splash.open .splash-hud{opacity:0;transform:scale(1.06);}
  .splash.open .splash-sheet-wrap{opacity:0;transform:scale(1.03);}
  .splash.hide{opacity:0;visibility:hidden;pointer-events:none;transition:opacity .25s ease,visibility .25s;}
  @keyframes mark-pop{0%{transform:scale(0);opacity:0;}65%{transform:scale(1.25);}100%{transform:scale(1);opacity:1;}}
  @keyframes stamp-slam{0%{opacity:0;transform:scale(2.6) rotate(-4deg);}55%{opacity:1;transform:scale(.9) rotate(-14deg);}75%{transform:scale(1.06) rotate(-11deg);}100%{opacity:.93;transform:scale(1) rotate(-12deg);}}
  @keyframes sheet-slam{0%{transform:scale(1);}40%{transform:scale(1.02);}100%{transform:scale(1);}}
  @keyframes splash-glow-pulse{0%{opacity:0;}25%{opacity:1;}100%{opacity:.5;}}
  @keyframes splash-boom{0%{transform:scale(1);}35%{transform:scale(1.1);color:#c0392b;}100%{transform:scale(1);}}
  @keyframes splash-shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-4px);}40%{transform:translateX(4px);}60%{transform:translateX(-3px);}80%{transform:translateX(2px);}}
  @keyframes splash-flash{0%{opacity:0;}28%{opacity:1;}100%{opacity:0;}}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--purple-mid);border-radius:50%;animation:spin .9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.spinner{animation:none;}.splash.boom .splash-pct,.splash.boom .splash-hud,.splash.boom::after,.splash.boom .exam-sheet,.splash.boom .splash-glow,.pass-stamp.show,.exam-row.checked .exam-mark::after,.app-reveal{animation:none!important;}.splash-door{transition:opacity .1s ease,transform .3s ease!important;}.pass-stamp.show{opacity:.9;transform:scale(1) rotate(-12deg);}}
  .lead{color:var(--purple-deep);font-size:17px;font-weight:700;margin:0;}
  .note{color:var(--muted);font-size:14px;line-height:1.8;margin:0;max-width:30em;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--purple-deep);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;opacity:0;transition:.25s;z-index:50;pointer-events:none;box-shadow:0 6px 24px rgba(46,42,94,.28);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .modal-bg{position:fixed;inset:0;background:rgba(46,42,94,.45);display:none;align-items:flex-end;justify-content:center;z-index:40;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));}
  .modal .x{float:right;font-size:22px;color:var(--muted);background:none;border:none;cursor:pointer;line-height:1;padding:0;}
  .foot{margin-top:32px;text-align:center;font-size:11px;color:var(--muted);letter-spacing:.08em;}
  .welcome-name{font-size:16px;font-weight:500;color:var(--ink);}
  .sitenav{position:sticky;top:0;z-index:20;display:flex;gap:6px;overflow-x:auto;margin:0 -16px 18px;padding:8px 16px 10px;background:rgba(240,240,248,.92);backdrop-filter:blur(8px);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .sitenav::-webkit-scrollbar{display:none;}
  .sitenav-item{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;white-space:nowrap;transition:background .2s,border-color .2s,color .2s;}
  .sitenav-dot{width:7px;height:7px;border-radius:50%;flex:none;}
  .sitenav-item.is-active{background:var(--purple-pale);border-color:var(--purple-mid);color:var(--purple-deep);}
  .sitenav-item[data-nav="home"] .sitenav-dot{background:#5a9e6e;}
  .sitenav-item[data-nav="pack"] .sitenav-dot{background:#d4843f;}
  .sitenav-item[data-nav="read"] .sitenav-dot{background:var(--purple-mid);}
  .sitenav-item[data-nav="meeting"] .sitenav-dot{background:#a85a4a;}
  .sitenav-item[data-nav="mypage"] .sitenav-dot{background:#4a7ab5;}
  .sitenav-item[data-nav="gimmick"] .sitenav-dot{background:#9a96a8;}
  .site-section{scroll-margin-top:58px;margin-top:28px;}
  .site-section:first-of-type{margin-top:0;}
  .sec-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 8px;border-radius:6px;margin-bottom:8px;}
  .sec-tag-home{background:#e8f2eb;color:#3d6b4a;}
  .sec-tag-pack{background:#faf0e6;color:#9a5a20;}
  .sec-tag-read{background:var(--purple-pale);color:var(--purple-deep);}
  .sec-tag-meeting{background:#f8ecea;color:#8a4038;}
  .sec-tag-mypage{background:#e8eef6;color:#3a5f8a;}
  .sec-tag-gimmick{background:#eeedf2;color:#6a6678;border:1px dashed #c8c4d4;}
  .room-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;padding:4px 10px;border-radius:999px;margin-bottom:10px;}
  .room-showroom{background:#e8f2eb;color:#3d6b4a;}
  .room-command{background:var(--purple-pale);color:var(--purple-deep);}
  .read-placeholder{text-align:center;padding:28px 12px;}
  .read-placeholder .h{font-size:15px;margin-bottom:6px;}
  .gimmick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .gimmick-chip{padding:12px 10px;border:1px dashed var(--line);border-radius:12px;background:var(--bg);font-size:12px;font-weight:500;color:var(--muted);text-align:center;}
  .gimmick-chip.soon::after{content:'準備中';display:block;font-size:10px;color:var(--purple-mid);margin-top:4px;font-weight:700;}
  .mypage-profile{display:grid;gap:10px;}
  .mypage-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--line);}
  .mypage-row:last-child{border-bottom:none;}
  .mypage-key{font-size:12px;color:var(--muted);}
  .mypage-val{font-size:13px;font-weight:600;color:var(--ink);text-align:right;}
  .reg-form{display:grid;gap:10px;}
  .reg-label{font-size:12px;font-weight:600;color:var(--purple-deep);margin-bottom:-4px;}
  .date-pick{position:relative;}
  .date-pick-native{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;}
  .date-pick-face{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-size:15px;color:var(--ink);pointer-events:none;}
  .date-pick-face.is-placeholder{color:var(--muted);}
  .date-pick-icon{color:var(--purple-mid);flex:none;}
  .date-pick.has-value .date-pick-face{border-color:var(--purple-mid);color:var(--ink);}
  .showroom-intro{font-size:13px;line-height:1.75;color:var(--muted);margin:6px 0 14px;}
  .showroom-gallery{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 10px;scroll-snap-type:x proximity;}
  .showroom-card{scroll-snap-align:start;flex:0 0 78%;max-width:320px;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 8px 28px -12px rgba(46,42,94,.14);}
  .showroom-cover{aspect-ratio:4/3;background:var(--purple-pale);line-height:0;}
  .showroom-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .showroom-body{padding:12px 14px 14px;}
  .showroom-kind{font-size:10px;letter-spacing:.12em;color:var(--purple-mid);font-weight:700;}
  .showroom-name{font-family:"Noto Serif JP",serif;font-size:16px;font-weight:700;color:var(--purple-deep);margin-top:4px;line-height:1.35;}
  .showroom-meta{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;}
  .showroom-actions{display:flex;gap:8px;margin-top:12px;}
  .showroom-actions .btn{flex:1;}
  .showroom-hint{font-size:11px;color:var(--muted);margin-top:8px;}

<script>
  // ===== 設定（ここを埋める）=====
  var LIFF_ID     = '2010419982-OX2dJTw2';
  var GAS_URL     = 'https://script.google.com/macros/s/AKfycbw9rH4C5D6BsP5MmFtVp-OS-nlFey9vgRTbtoGy1c2PQiEnFN79F1Hql_vcs2djBhugUQ/exec';
  var LINE_OA_URL = 'https://lin.ee/rhVLcXn';

  var PROFILE = null;
  var app = document.getElementById('app');
  var splash = document.getElementById('splash');
  var CROWN = '<svg class="crown" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M2.5 7l4.2 4 5.3-7 5.3 7 4.2-4-2.1 12.5H4.6L2.5 7z"/></svg>';

  function prefersReducedMotion(){
    return window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }

  function hideSplash(){
    if (!splash) return;
    splash.classList.add('hide');
    splash.setAttribute('aria-busy', 'false');
  }

  var examRows = null;
  var redPen = null;
  var passStamp = null;
  var examTotal = null;
  var lastCheckedRow = -1;

  function moveRedPenToRow(row){
    if (!redPen || !row) return;
    var sheet = document.getElementById('examSheet');
    var mark = row.querySelector('.exam-mark');
    if (!sheet || !mark) return;
    var sheetR = sheet.getBoundingClientRect();
    var markR = mark.getBoundingClientRect();
    redPen.classList.add('active');
    redPen.style.left = (markR.left - sheetR.left + markR.width * 0.1) + 'px';
    redPen.style.top = (markR.top - sheetR.top - 4) + 'px';
    redPen.classList.remove('tap');
    void redPen.offsetWidth;
    redPen.classList.add('tap');
  }

  function updateExamSplash(pct){
    if (!examRows){
      examRows = splash.querySelectorAll('.exam-row');
      redPen = document.getElementById('redPen');
      passStamp = document.getElementById('passStamp');
      examTotal = document.getElementById('examTotal');
    }
    var checkedCount = 0;
    for (var i = 0; i < examRows.length; i++){
      var row = examRows[i];
      var at = Number(row.dataset.at) || 0;
      if (pct >= at - 4) row.classList.add('live');
      if (pct >= at){
        if (!row.classList.contains('checked')){
          row.classList.add('checked');
          var statusEl = row.querySelector('.exam-score');
          if (statusEl) statusEl.textContent = statusEl.dataset.status;
          if (i !== lastCheckedRow){
            lastCheckedRow = i;
            moveRedPenToRow(row);
          }
        }
        checkedCount++;
      }
    }
    if (examTotal && checkedCount === examRows.length && pct >= 78){
      examTotal.innerHTML = '100<small>%</small>';
      examTotal.classList.add('show');
    }
    if (passStamp) passStamp.classList.toggle('show', pct >= 94);
    if (pct >= 94 && redPen) redPen.classList.remove('active');
    var sub = splash.querySelector('.exam-head-sub');
    if (sub && pct >= 94) sub.textContent = '設計完了';
  }

  function setSplashPct(n){
    var pctEl = document.getElementById('splashPct');
    var fillEl = document.getElementById('splashFill');
    if (pctEl) pctEl.textContent = n + '%';
    if (fillEl) fillEl.style.width = n + '%';
    updateExamSplash(n);
  }

  function runSplashAnimation(loadPromise){
    var MIN_MS = 3400;
    var reduceMotion = prefersReducedMotion();
    return new Promise(function(resolve){
      var dataReady = false;
      var finished = false;
      var pct = 0;
      var start = performance.now();
      loadPromise.then(function(){ dataReady = true; }).catch(function(){ dataReady = true; });

      function finish(){
        if (finished) return;
        finished = true;
        setSplashPct(100);
        if (reduceMotion){
          hideSplash();
          resolve();
          return;
        }
        splash.classList.add('boom');
        setTimeout(function(){
          splash.classList.add('open');
          setTimeout(function(){
            hideSplash();
            resolve();
          }, 800);
        }, 480);
      }

      function frame(now){
        var elapsed = now - start;
        var timePct = Math.min(100, Math.floor((1 - Math.pow(1 - Math.min(elapsed / MIN_MS, 1), 2.1)) * 100));
        if (!dataReady) timePct = Math.min(timePct, 99);
        if (timePct > pct) pct = timePct;
        setSplashPct(pct);
        if (dataReady && elapsed >= MIN_MS && pct >= 100) finish();
        else requestAnimationFrame(frame);
      }

      setSplashPct(0);
      requestAnimationFrame(frame);
    });
  }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
  function yen(n){ return '¥' + (Number(n)||0).toLocaleString('ja-JP'); }
  function daysUntil(iso){ var t=new Date(iso+'T00:00:00+09:00').getTime(); return Math.max(0, Math.ceil((t-Date.now())/86400000)); }
  function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},2600); }

  async function api(action, payload){
    var p = Object.assign({ action: action, idToken: liff.getIDToken(), displayName: PROFILE ? PROFILE.displayName : '' }, payload || {});
    var res = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(p) });
    return res.json();
  }

  // ===== パーツ =====
  function headerHtml(){
    return '<header class="page-hero">'
      + '<div class="hero-cover"><div class="hero-cover-kick">学部別合格設計塾　THINKING</div><img class="hero-cover-img" src="assets/hero-top.png" alt="逆転設計室" width="1024" height="1024" loading="eager"></div>'
      + '<div class="hero-panel"><div class="brandrow">' + CROWN + '<span class="brandname">逆転設計室</span></div>'
      + '<div class="hero-tagline">戦略で、未来をひっくり返す</div></div></header>';
  }

  var SHOWROOM_ITEMS = [
    { name:'学習院大学 経済学部', img:'assets/showroom/gakushuin-keizai.png', keys:['学習院','経済'] },
    { name:'早稲田大学 文化構想学部', img:'assets/showroom/waseda-bunka.png', keys:['早稲田','文化構想'] },
    { name:'青山学院大学 法学部', img:'assets/showroom/aoyama-law.png', keys:['青山','法学'] },
    { name:'中央大学 法学部', img:'assets/showroom/chuo-law.png', keys:['中央','法学'] },
    { name:'早稲田大学 商学部', img:'assets/showroom/waseda-commerce.png', keys:['早稲田','商学'] },
    { name:'明治大学 経営学部', img:'assets/showroom/meiji-business.png', keys:['明治','経営'] }
  ];

  function matchCatalogPack(item, catalog){
    for (var i = 0; i < catalog.length; i++){
      var c = catalog[i];
      var text = (c.name || '') + (c.university || '') + (c.faculty || '');
      var ok = true;
      for (var j = 0; j < item.keys.length; j++){
        if (text.indexOf(item.keys[j]) < 0){ ok = false; break; }
      }
      if (ok) return c;
    }
    return null;
  }

  function packFreeSample(pack){
    if (!pack || !pack.contents) return null;
    for (var i = 0; i < pack.contents.length; i++){
      if (pack.contents[i].free && pack.contents[i].url) return pack.contents[i];
    }
    return null;
  }

  function showroomCardHtml(item, pack){
    var free = pack ? packFreeSample(pack) : null;
    var chip = free
      ? '<span class="showroom-chip showroom-chip-free">見本あり</span>'
      : '<span class="showroom-chip showroom-chip-lock">ショールーム展示</span>';
    var meta = pack ? yen(pack.price) + ' · 購入で設計一式を解放' : '合格設計見本 · 近日受付開始';
    var actions = '';
    if (free){
      actions += '<button class="btn ghost sm" data-url="' + esc(free.url) + '">見本を見る</button>';
    }
    if (pack){
      actions += '<button class="btn gold sm" data-pack="' + esc(pack.packId) + '" data-pname="' + esc(pack.name) + '">解放する</button>';
    } else {
      actions += '<button class="btn ghost sm" onclick="toast(\'この見本は準備中です\')">詳細</button>';
    }
    return '<article class="showroom-card" data-name="' + esc(item.name) + '">'
      + '<div class="showroom-cover"><img src="' + esc(item.img) + '" alt="' + esc(item.name) + '" loading="lazy"></div>'
      + '<div class="showroom-body"><div class="showroom-kind">合格設計見本</div>'
      + '<div class="showroom-name">' + esc(item.name) + '</div>' + chip
      + '<div class="showroom-meta">' + meta + '</div>'
      + '<div class="showroom-actions">' + actions + '</div></div></article>';
  }

  function showroomGalleryHtml(catalog){
    var cards = SHOWROOM_ITEMS.map(function(item){
      return showroomCardHtml(item, matchCatalogPack(item, catalog));
    }).join('');
    return '<div class="showroom-gallery" id="showroomGallery">' + cards + '</div>'
      + '<div class="showroom-hint">← スワイプで他大学の見本を見る →</div>';
  }
  function formatDateJa(iso){
    if (!iso) return '';
    var p = iso.split('-');
    if (p.length < 3) return iso;
    return p[0] + '年' + Number(p[1]) + '月' + Number(p[2]) + '日';
  }

  function siteNavHtml(active){
    var items = [
      { id:'home', label:'ホーム' },
      { id:'pack', label:'ショールーム' },
      { id:'read', label:'読みもの' },
      { id:'meeting', label:'作戦会議' },

        return '<a class="' + cls + '" href="#sec-' + it.id + '" data-nav="' + it.id + '"><span class="sitenav-dot" aria-hidden="true"></span>' + it.label + '</a>';
      }).join('') + '</nav>';

  function homeHtml(data){
    var owner = data.owned.length > 0;
    var s = data.student;
    var badge = owner

    if (s.examDate && s.firstChoice){
      body += '<div class="card" style="margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;">'

    } else if (data.owned.length){

    return '<section id="sec-home" class="site-section">' + badge

  function packSectionHtml(data){

  function ownedPackHtml(p){
    var item = null;
    for (var i = 0; i < SHOWROOM_ITEMS.length; i++){
      if (matchCatalogPack(SHOWROOM_ITEMS[i], [p])){ item = SHOWROOM_ITEMS[i]; break; }
    }
    var img = item ? item.img : (p.image || '');
    var cover = img
      ? '<div class="showroom-cover" style="border-radius:10px;overflow:hidden;margin-bottom:12px;"><img src="' + esc(img) + '" alt="' + esc(p.name) + '"></div>'
      : '<div class="packimg placeholder"><span class="muted" style="font-size:12px;">合格設計見本</span></div>';
    var hint = p.contents.length > 2 ? '<div class="swipehint">← スワイプで教材を切り替え →</div>' : '';
    return '<div style="margin-top:14px;"><div class="kicker">解放済み・合格設計見本</div>'
      + '<div class="serif-title">' + esc(p.name) + '</div>' + cover
      + '<div class="swipe">' + p.contents.map(ownedCard).join('') + '</div>' + hint + '</div>';
  }

  function previewCard(c){
    if (c.free && c.url){
      return '<button class="swcard" data-url="' + esc(c.url) + '">'
        + '<span class="freechip">無料</span><span class="swtitle">' + esc(c.title) + '</span>'
        + '<span class="swopen">見てみる →</span></button>';
    }
    return '<div class="swcard locked"><span class="swtitle muted">' + esc(c.title) + '</span>'
      + '<span class="swlocked">購入で解放</span></div>';
  }

  function heroHtml(catalog, student){
    if (!catalog.length) return '';
    var f = null;
    for (var i=0;i<catalog.length;i++){ if (catalog[i].name === student.firstChoice){ f = catalog[i]; break; } }
    if (!f) f = catalog[0];
    return '<div class="card pack-promo" style="margin-top:14px;"><div class="kicker">購入すると、この設計一式が解放されます</div>'
      + '<div class="serif-title">' + esc(f.name) + '</div>'
      + '<div class="swipe">' + f.contents.map(previewCard).join('') + '</div>'
      + '<button class="btn gold" style="width:100%;margin-top:12px;" data-pack="' + esc(f.packId) + '" data-pname="' + esc(f.name) + '">このパックを解放（' + yen(f.price) + '）</button></div>';
  }

  function catalogHtml(catalog){
    var rows = catalog.map(function(p){
      var free = null;
      for (var i=0;i<p.contents.length;i++){ if (p.contents[i].free && p.contents[i].url){ free = p.contents[i]; break; } }
      var sample = free ? '　<a class="samplelink" data-url="' + esc(free.url) + '">無料サンプル →</a>' : '';
      return '<div class="catrow" data-name="' + esc(p.name + p.university + p.faculty) + '">'
        + '<div><div class="catname">' + esc(p.name) + '</div><div class="catmeta">' + yen(p.price) + sample + '</div></div>'
        + '<button class="btn sm" data-pack="' + esc(p.packId) + '" data-pname="' + esc(p.name) + '">申込</button></div>';
    }).join('');
    return '<div style="margin-top:4px;"><input id="catsearch" placeholder="大学名・学部で検索" oninput="filterCatalog()" style="margin:0 0 12px;">'
      + '<div class="card"><div id="catlist">' + (rows || '<div class="muted" style="font-size:13px;">現在、購入できる学部はありません。</div>') + '</div></div></div>';
  }

  function requestHtml(){
    return '<div class="card"><div class="reqhead">'
      + '<div><div class="h" style="font-size:16px;">受けたい学部がない?</div>'
      + '<div class="muted" style="font-size:13px;">あなたの受ける学部、つくります。</div></div>'
      + '<button class="btn ghost sm" onclick="toggleReq()">リクエスト</button></div>'
      + '<div id="reqform" style="display:none;margin-top:14px;">'
      + '<input id="reqUni" placeholder="大学名（例：上智大学）" style="margin-bottom:8px;">'
      + '<input id="reqFac" placeholder="学部名（例：経済学部）" style="margin-bottom:10px;">'
      + '<button class="btn gold" style="width:100%;" onclick="sendReq()">この学部をリクエストする</button></div></div>';
  }

  function gimmickSectionHtml(){
    return '<section id="sec-gimmick" class="site-section">'
      + '<span class="sec-tag sec-tag-gimmick">仕掛け</span>'
      + '<h2 class="h">仕掛け</h2>'
      + '<p class="gimmick-lead">合格設計を加速する、逆転設計室の仕掛け。診断・カレンダー・リクエストで、設計を自分ごとにします。</p>'
      + requestHtml()
      + '<div class="gimmick-grid">'
      + '<div class="gimmick-chip soon">併願診断</div>'
      + '<div class="gimmick-chip soon">受験カレンダー</div>'
      + '</div></section>';
  }

  function footHtml(){ return '<div class="foot">逆転設計室　/　学部別合格設計塾 THINKING</div>'; }

  // ===== 描画 =====
  function renderPortal(data){
    var owner = data.owned.length > 0;
    var html = siteNavHtml('home')
      + homeHtml(data)
      + packSectionHtml(data)
      + readSectionHtml()
      + meetingSectionHtml(data.student, owner)
      + myPageHtml(data.student)
      + gimmickSectionHtml()
      + footHtml();
    app.className = 'app-reveal';
    app.innerHTML = headerHtml() + '<div class="wrap">' + html + '</div>';
    bindDynamic();
    bindSiteNav();
    initDatePick();
  }

  function bindSiteNav(){
    var links = document.querySelectorAll('.sitenav-item');
    links.forEach(function(a){
      a.addEventListener('click', function(){
        links.forEach(function(x){ x.classList.remove('is-active'); });
        a.classList.add('is-active');
      });
    });
  }

  function initDatePick(){
    var input = document.getElementById('regDate');
    var face = document.getElementById('regDateFace');
    var wrap = document.getElementById('regDatePick');
    if (!input || !face || !wrap) return;
    function sync(){
      var label = face.querySelector('span');
      if (input.value){
        if (label) label.textContent = formatDateJa(input.value);
        wrap.classList.add('has-value');
        face.classList.remove('is-placeholder');
      } else {
        if (label) label.textContent = '試験日';
        wrap.classList.remove('has-value');
        face.classList.add('is-placeholder');
      }
    }
    input.addEventListener('change', sync);
    input.addEventListener('input', sync);
    sync();
  }

  function bindDynamic(){
    document.querySelectorAll('[data-url]').forEach(function(el){
      el.addEventListener('click', function(){ openContent(el.dataset.url); });
    });
    document.querySelectorAll('[data-pack]').forEach(function(el){
      el.addEventListener('click', function(){ openApply(el.dataset.pack, el.dataset.pname); });
    });
  }

  // ===== アクション =====
  function openContent(url){
    if (!url){ toast('準備中です'); return; }
    liff.openWindow({ url: url, external: true });
  }

  async function lineContact(msg){
    try{
      if (liff.isInClient() && liff.isApiAvailable('sendMessages')){
        await liff.sendMessages([{ type:'text', text: msg }]);
        toast('LINEに送信しました。運営から折り返します。');
        return;
      }
    }catch(e){}
    liff.openWindow({ url: LINE_OA_URL, external: true });
  }
  function lineBook(){ lineContact('【個別作戦会議の予約希望】'); }

  var APPLY_PACK = '';
  function openApply(packId, name){
    APPLY_PACK = packId;
    document.getElementById('applyName').textContent = name;
    document.getElementById('applyPayer').value = '';
    document.getElementById('applybg').classList.add('show');
  }
  function closeApply(){ document.getElementById('applybg').classList.remove('show'); }
  async function submitApply(){
    var payer = document.getElementById('applyPayer').value.trim();
    if (!payer){ toast('お振込名義を入力してください'); return; }
    var r = await api('apply', { packId: APPLY_PACK, payerName: payer });
    if (r.ok){
      closeApply();
      lineContact('#申込_' + APPLY_PACK);
      toast('お申し込みを受け付けました。LINEに案内が届きます。');
    } else {
      toast('申し込みに失敗しました');
    }
  }

  function toggleReq(){
    var f = document.getElementById('reqform');
    f.style.display = (f.style.display === 'none') ? 'block' : 'none';
  }

  async function submitRegister(){
    var firstChoice = document.getElementById('regChoice').value.trim();
    var examDate = document.getElementById('regDate').value;
    if (!firstChoice || !examDate){ toast('第一志望と入試日を入力してください'); return; }
    var r = await api('register', { firstChoice: firstChoice, examDate: examDate });
    if (r.ok){ toast('登録しました'); refresh(); } else { toast('登録に失敗しました'); }
  }

  async function sendReq(){
    var university = document.getElementById('reqUni').value.trim();
    var faculty = document.getElementById('reqFac').value.trim();
    if (!university){ toast('大学名を入力してください'); return; }
    var r = await api('request', { university: university, faculty: faculty });
    if (r.ok){ document.getElementById('reqform').innerHTML = '<div class="muted" style="font-size:13px;line-height:1.8;">リクエストを受け付けました。作成でき次第、ショールームに並べてお知らせします。</div>'; }
    else { toast('送信に失敗しました'); }
  }

  function filterShowroom(){
    var input = document.getElementById('catsearch');
    if (!input) return;
    var q = input.value.trim();
    document.querySelectorAll('#sec-pack .showroom-card').forEach(function(el){
      el.style.display = (el.dataset.name.indexOf(q) >= 0) ? '' : 'none';
    });
  }

  async function refresh(){
    var data = await api('portal', {});
    if (data.ok) renderPortal(data);
  }

  function showBlocked(){
    hideSplash();
    app.className = 'center';
    app.innerHTML = '<p class="lead">読み込めませんでした</p>'
      + '<p class="note">お手数ですが、公式LINEのトーク画面から開き直してください。</p>'
      + '<a class="btn" href="' + LINE_OA_URL + '">公式LINEへ</a>';
  }

  async function main(){
    try{
      var loadPromise = (async function(){
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()){ liff.login(); return null; }
        PROFILE = await liff.getProfile();
        return await api('portal', {});
      })();

      await runSplashAnimation(loadPromise);
      var data = await loadPromise;
      if (!data) return;
      if (data.ok){ renderPortal(data); }
      else { showBlocked(); }
    }catch(err){
      hideSplash();
      app.className = 'center';
      app.innerHTML = '<p class="note">読み込みに失敗しました。LINEから開き直してください。<br><span style="font-size:12px;color:#a39a82;">' + esc(String(err)) + '</span></p>';
    }
  }
  main();
</script>
</body>
</html>
