# Netlify — static HTML + in-browser Babel (no npm build step)
# サイト内リンクは *.html 相対（VS Code「Go Live」は netlify.toml を読まないため /faq が 404 になるのを避ける）。
#
# Dashboard checklist (in addition to this file):
# - Site settings → Build & deploy → Continuous deployment: production branch = main
# - After plan/billing fixes: run "Trigger deploy" → "Clear cache and deploy site" once
# - Optional: Deploy notifications / build hooks for visibility

[build]
  publish = "."
  command = "true"

# JSX sources change often; avoid long-lived CDN cache on these paths after deploys.
[[headers]]
  for = "/components/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ---------------------------------------------------------------------------
# Pretty URLs（拡張子なし）— 例: /support が support.html を返す
# かつ *.html へ来たブックマークは 301 で正規化（クエリは Netlify が引き継ぎ）
# ---------------------------------------------------------------------------

# 301: 旧 URL → 正規パス
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
[[redirects]]
  from = "/support.html"
  to = "/support"
  status = 301
[[redirects]]
  from = "/strategy.html"
  to = "/strategy"
  status = 301
[[redirects]]
  from = "/voice.html"
  to = "/voice"
  status = 301
[[redirects]]
  from = "/price.html"
  to = "/price"
  status = 301
[[redirects]]
  from = "/products.html"
  to = "/products"
  status = 301
[[redirects]]
  from = "/faq.html"
  to = "/faq"
  status = 301
[[redirects]]
  from = "/founder.html"
  to = "/founder"
  status = 301
[[redirects]]
  from = "/blog.html"
  to = "/blog"
  status = 301
[[redirects]]
  from = "/blog-article.html"
  to = "/blog-article"
  status = 301
[[redirects]]
  from = "/product-kangaku-english.html"
  to = "/product-kangaku-english"
  status = 301

# 200: 正規パス → 実ファイル（アドレスバーは拡張子なしのまま）
[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200
[[redirects]]
  from = "/strategy"
  to = "/strategy.html"
  status = 200
[[redirects]]
  from = "/voice"
  to = "/voice.html"
  status = 200
[[redirects]]
  from = "/price"
  to = "/price.html"
  status = 200
[[redirects]]
  from = "/products"
  to = "/products.html"
  status = 200
[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200
[[redirects]]
  from = "/founder"
  to = "/founder.html"
  status = 200
[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200
[[redirects]]
  from = "/blog-article"
  to = "/blog-article.html"
  status = 200
[[redirects]]
  from = "/product-kangaku-english"
  to = "/product-kangaku-english.html"
  status = 200
