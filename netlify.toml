# ジャーナル記事 — /blog/:slug（クエリなしのきれいなURL）
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/pages/:slug.html"
  status = 200

# 旧URL（?slug=）→ 正規パスへ 301
[[redirects]]
  from = "/blog-article"
  to = "/blog/:slug"
  status = 301
  query = {slug = ":slug"}
  force = true

