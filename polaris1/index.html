<!doctype html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>英文法ポラリス1 完成問題集</title><style>
:root{--ink:#1a1a1a;--sub:#666;--line:#e2e2e2;--accent:#0b5cad;--accent2:#c0392b;--bg:#fff;--soft:#f6f8fa;--tag:#eef4fb;}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;color:var(--ink);background:#f0f2f5;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;line-height:1.85;font-size:16px;}
.wrap{max-width:840px;margin:0 auto;background:var(--bg);padding:48px 56px 96px;box-shadow:0 0 24px rgba(0,0,0,.06);min-height:100vh;}
.cover{text-align:center;padding:40px 0 8px;border-bottom:3px solid var(--ink);margin-bottom:8px;}
.cover .series{font-size:14px;letter-spacing:.3em;color:var(--sub);}
.cover h1{font-size:30px;margin:12px 0 4px;letter-spacing:.06em;}
.cover .edition{display:inline-block;margin-top:10px;padding:6px 22px;border:2px solid var(--ink);border-radius:999px;font-weight:700;letter-spacing:.25em;font-size:15px;}
.cover .lead{color:var(--sub);margin-top:18px;font-size:15px;}
.legend{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin:24px 0;font-size:14px;color:#333;}
.legend b{color:var(--accent);}
h2.chap{font-size:22px;margin:44px 0 0;padding:10px 0 8px;border-bottom:2px solid var(--accent);color:var(--accent);letter-spacing:.04em;}
h3.unit{font-size:17px;margin:30px 0 14px;padding-left:12px;border-left:5px solid var(--accent2);letter-spacing:.03em;}
.q{padding:14px 0 16px;border-bottom:1px dashed var(--line);}
.qhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.qno{font-weight:800;font-size:17px;color:var(--ink);min-width:44px;}
.qtag{font-size:11px;background:var(--tag);color:var(--accent);border:1px solid #cfe0f2;border-radius:5px;padding:1px 8px;letter-spacing:.08em;}
.stem{margin:2px 0 6px;}
.stem .jp{color:#333;}
.choices{margin-top:6px;color:#222;}
.choices .row{display:flex;flex-wrap:wrap;gap:6px 22px;}
.choices .c{white-space:nowrap;}
.blank{font-weight:700;letter-spacing:.1em;color:#999;}
/* explanation */
.ex{padding:20px 0 22px;border-bottom:1px solid var(--line);}
.exhead{display:flex;align-items:baseline;gap:12px;margin-bottom:10px;}
.exno{font-weight:800;font-size:18px;}
.ans{font-weight:800;color:#fff;background:var(--accent2);border-radius:6px;padding:2px 12px;font-size:15px;letter-spacing:.06em;}
.line{margin:5px 0;}
.line .lb{display:inline-block;font-weight:700;color:var(--accent);min-width:66px;}
.answ b{color:var(--accent2);}
.point{background:#fff8e6;border:1px solid #f0dca0;border-radius:8px;padding:8px 12px;margin:8px 0;font-size:14.5px;}
.point .lb{color:#a6791a;}
.body{margin:10px 0 8px;font-size:15px;color:#222;}
.check{background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-top:8px;font-size:14px;}
.check .lb{font-weight:700;color:#555;display:block;margin-bottom:4px;}
.check ul{margin:0;padding-left:18px;}
.note{color:#888;font-size:13px;margin-top:8px;font-style:normal;}
.toc{columns:2;column-gap:32px;font-size:14px;margin:20px 0 0;}
.toc a{color:var(--accent);text-decoration:none;}
.toc .ct{font-weight:700;color:var(--ink);display:block;margin:12px 0 4px;break-after:avoid;}
.foot{color:#aaa;font-size:12px;text-align:center;margin-top:40px;}
.appendix h2{font-size:20px;color:var(--accent2);border-bottom:2px solid var(--accent2);padding-bottom:6px;margin-top:40px;}
table{border-collapse:collapse;width:100%;font-size:13px;margin:12px 0;}
th,td{border:1px solid var(--line);padding:6px 9px;text-align:left;vertical-align:top;}
th{background:var(--soft);}
.nav{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:10px 16px;text-align:center;font-size:14px;z-index:10;}
.nav a{color:var(--accent);text-decoration:none;margin:0 10px;font-weight:600;}
@media(max-width:640px){.wrap{padding:24px 18px 64px;}.toc{columns:1;}.cover h1{font-size:24px;}}
@media print{body{background:#fff;font-size:11pt;line-height:1.6;}.wrap{box-shadow:none;max-width:100%;padding:0;}.nav{display:none;}.q,.ex{break-inside:avoid;}h2.chap{break-before:page;}.cover{break-after:avoid;}}
</style></head>
